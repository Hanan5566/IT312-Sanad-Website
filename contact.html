    <main>
	<h1 style="color: #1F3A5F; font-size: 32px;"> Contact Sanad</h1>
        <div class="contact-container" style="text-align: center;">
            
            
            <div class="contact-card">
                <form id="contactForm" action="#" method="POST">
                    <div class="form-group">
                        <label for="fullname">Full Name</label>
                        <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="example@domain.com" required>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                    </div>

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </div>

<script>
const contactForm = document.getElementById('contactForm');

function validateFullName(name) {
    if (name.trim() === '') {
        return false;
    }
    
    const startsWithNumber = /^[0-9]/.test(name);
    if (startsWithNumber) {
        return false;
    }
    
    const parts = name.trim().split(/\s+/);
    if (parts.length < 2) {
        return false;
    }
    
    return true;
}

function validateEmail(email) {
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return emailPattern.test(email);
}

function validateMessage(message) {
    return message.trim() !== '';
}

contactForm.addEventListener('submit', function(event) {
    event.preventDefault();
    
    const fullname = document.getElementById('fullname').value;
    const email = document.getElementById('email').value;
    const message = document.getElementById('message').value;
    
    let errorMessage = '';
    
    if (fullname.trim() === '') {
        errorMessage = 'Please fill in your full name.';
    } else if (/^[0-9]/.test(fullname)) {
        errorMessage = 'Name cannot start with numbers.';
    } else if (fullname.trim().split(/\s+/).length < 2) {
        errorMessage = 'Please enter your full name (First Name and Last Name).';
    } else if (email.trim() === '') {
        errorMessage = 'Please fill in your email address.';
    } else if (!validateEmail(email)) {
        errorMessage = 'Please enter a valid email address (e.g., name@domain.com).';
    } else if (message.trim() === '') {
        errorMessage = 'Please write your message.';
    }
    
    if (errorMessage !== '') {
        alert(errorMessage);
    } else {
        const firstName = fullname.trim().split(/\s+/)[0];
        alert(`Thank you ${firstName}! Your message has been sent successfully.`);
        contactForm.reset();
    }
});


const mobileMenuBtn = document.getElementById('mobile-menu');
const navListMenu = document.getElementById('nav-list');

if (mobileMenuBtn && navListMenu) {
    mobileMenuBtn.onclick = function() {
        
        mobileMenuBtn.classList.toggle('is-active');
        
        navListMenu.classList.toggle('open-now');
    };
}


document.addEventListener('click', function(event) {
    if (navListMenu.classList.contains('open-now')) {
        if (!navListMenu.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
            navListMenu.classList.remove('open-now');
            mobileMenuBtn.classList.remove('is-active');
        }
    }
});
</script>
