<script>
    const teachersData = [
        { name: "Dr. Ahmed Al-Mohamed", exp: 10, email: "coach.ahmed@sanad.org.sa", img: "images/teacher1.jpeg" },
        { name: "Dr. Sara Al-Qahtani", exp: 7, email: "coach.sara@sanad.org.sa", img: "images/teacher2.jpeg" },
        { name: "Dr. Khalid Al-Harbi", exp: 15, email: "coach.khalid@sanad.org.sa", img: "images/teacher3.jpeg" },
        { name: "Dr. Maha Al-Dosari", exp: 5, email: "coach.maha@sanad.org.sa", img: "images/teacher4.jpeg" },
        { name: "Dr. Omar Al-Shehri", exp: 12, email: "coach.omar@sanad.org.sa", img: "images/teacher5.JPEG" },
        { name: "Dr. Noura Al-Otaibi", exp: 8, email: "coach.noura@sanad.org.sa", img: "images/teacher6.jpeg" }
    ];

    let currentTeachers = [...teachersData];

    function renderTeachers(teachersArray) {
        const container = document.getElementById("teachersContainer");
        container.innerHTML = "";
        teachersArray.forEach(teacher => {
            const card = document.createElement("div");
            card.className = "teacher-card";
            card.innerHTML = `
                <img src="${teacher.img}" alt="${teacher.name}">
                <h3>${teacher.name}</h3>
                <p class="exp">${teacher.exp} Years Exp.</p>
                <p><a href="mailto:${teacher.email}">📧 ${teacher.email}</a></p>
            `;
            container.appendChild(card);
        });
    }

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function sortTeachers(type) {
        let sorted = [...teachersData];
        if (type === "name_asc") {
            sorted.sort((a, b) => a.name.localeCompare(b.name));
        } else if (type === "name_desc") {
            sorted.sort((a, b) => b.name.localeCompare(a.name));
        } else if (type === "exp_high") {
            sorted.sort((a, b) => b.exp - a.exp);
        } else if (type === "exp_low") {
            sorted.sort((a, b) => a.exp - b.exp);
        }
        currentTeachers = sorted;
        renderTeachers(currentTeachers);
    }

    function initPage() {
        const shuffled = shuffleArray([...teachersData]);
        currentTeachers = shuffled;
        renderTeachers(currentTeachers);

        const sortSelect = document.getElementById("sortTeachers");
        sortSelect.addEventListener("change", (e) => {
            sortTeachers(e.target.value);
        });
    }

    initPage();
	
	
const mobileMenuBtn = document.getElementById('mobile-menu');
const navListMenu = document.getElementById('nav-list');

if (mobileMenuBtn && navListMenu) {
    mobileMenuBtn.onclick = function() {
        
        mobileMenuBtn.classList.toggle('is-active');
       
        navListMenu.classList.toggle('open-now');
    };
}


document.addEventListener('click', function(event) {
    if (navListMenu.classList.contains('open-now')) {
        if (!navListMenu.contains(event.target) && !mobileMenuBtn.contains(event.target)) {
            navListMenu.classList.remove('open-now');
            mobileMenuBtn.classList.remove('is-active');
        }
    }
});
</script>
