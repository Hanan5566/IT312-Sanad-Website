    <p style="margin-top: 20px;"><a href="Home_page.html">Home</a> &gt; <a href="dashboard.html">Dashboard</a> &gt; Teacher Evaluation</p>

    <main>
        <h1>Teacher Evaluation</h1>
        <a href="dashboard.html" class="btn" style="background:#6B6B6B; padding:5px 15px; font-size:12px;">Back to Dashboard</a>

        <form id="evaluationForm" class="card" style="margin-top:20px; max-width:100%;">
            <h2>Evaluate Your Teacher</h2>

            <label for="teacherSelect">Choose your teacher from the list:</label><br>
            <select id="teacherSelect" name="teacher" required>
                <option value="" disabled selected>Select a teacher…</option>
                <option value="ahmed">Dr. Ahmed Al-Mohamed</option>
                <option value="sara">Dr. Sara Al-Qahtani</option>
                <option value="khalid">Dr. Khalid Al-Harbi</option>
                <option value="maha">Dr. Maha Al-Dosari</option>
                <option value="omar">Dr. Omar Al-Shehri</option>
                <option value="noura">Dr. Noura Al-Otaibi</option>
            </select>
            <br><br>

           <fieldset id="ratingGroup" style="border:1px solid #E5E5E5; padding:15px; border-radius:5px;">
                <legend style="padding:0 10px; font-weight:bold; color:#1F3A5F;">Your Rating:</legend>
                <label><input type="radio" name="rating" value="1"> 1 – Poor</label>
                <label><input type="radio" name="rating" value="2"> 2 – Fair</label>
                <label><input type="radio" name="rating" value="3"> 3 – Good</label>
                <label><input type="radio" name="rating" value="4"> 4 – Very Good</label>
                <label><input type="radio" name="rating" value="5"> 5 – Excellent</label>
            </fieldset>
            <br>

            <label for="feedback">Feedback and Comments:</label><br>
            <textarea id="feedback" name="feedback" rows="6" placeholder="Share your experience…"></textarea>
            <br><br>

            <input type="submit" id="submitEvaluation" value="Submit Evaluation" class="submit-btn">
        </form>
    </main>
